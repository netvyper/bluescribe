version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - bluescribe-data:/app/data
    restart: unless-stopped
    networks:
      - bluescribe_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bluescribe_network
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.bluescribe.rule=Host(`bluescribe.example.com`)"
    #   - "traefik.http.routers.bluescribe.entrypoints=websecure"
    #   - "traefik.http.routers.bluescribe.tls.certresolver=myresolver"

networks:
  bluescribe_network:
    driver: bridge

volumes:
  bluescribe-data:
